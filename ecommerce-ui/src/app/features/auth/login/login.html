<div class="login-page">

  <form class="login-card" (ngSubmit)="login()">

    <div class="logo">
      NEXORA
    </div>

    <h2>Welcome Back</h2>
    <p class="subtext">Login using OTP</p>

    <input
      type="text"
      name="mobileNumber"
      placeholder="Enter Mobile Number"
      [(ngModel)]="mobileNumber"
    />

    <input
      type="password"
      name="otp"
      placeholder="Enter OTP (0000)"
      [(ngModel)]="otp"
    />

    <button type="submit">
      Login
    </button>

    <div class="hint">
      <p>Customer: <b>1234567890</b> (OTP: 0000)</p>
      <p>Admin: <b>9876543210</b> (OTP: 0000)</p>
    </div>

  </form>

</div>
