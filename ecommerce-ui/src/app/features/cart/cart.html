<section class="cart-page">
  <div class="cart-left">
    <h1>Shopping Cart</h1>

    <div *ngIf="cartItems.length === 0">
      <p>Your cart is empty. Start shopping!</p>
    </div>

    <div class="cart-item" *ngFor="let item of cartItems">
      <img [src]="item.image" alt="{{item.name}}">

      <div class="info">
        <h3>{{item.name}}</h3>
        <p>₹{{item.price}}</p>

        <div class="qty">
          <button (click)="decrease(item)" [disabled]="item.quantity === 1">-</button>
          <span>{{item.quantity}}</span>
          <button (click)="increase(item)">+</button>
        </div>
      </div>

      <button class="remove-btn" (click)="removeItem(item.id)">Remove</button>
    </div>
  </div>

  <div class="cart-right" *ngIf="cartItems.length > 0">
    <h2>Order Summary</h2>

    <div class="summary-row">
      <span>Subtotal</span>
      <span>₹{{total}}</span>
    </div>

    <div class="summary-row">
      <span>Delivery</span>
      <span>Free</span>
    </div>

    <hr>

    <div class="summary-row total">
      <span>Total</span>
      <span>₹{{total}}</span>
    </div>

    <button class="checkout-btn" (click)="goToCheckout()">Proceed To Checkout</button>
  </div>
</section>
